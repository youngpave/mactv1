<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAÇTV | Player</title>

<!-- Clappr -->
<script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

<style>
body {
    margin:0;
    background:black;
    font-family:sans-serif;
}

/* PLAYER */
#player {
    width:100%;
    height:100vh;
}

/* GERİ BUTON */
.top-nav {
    position:absolute;
    top:15px;
    left:15px;
    z-index:999;
}
.back-btn {
    color:white;
    background:rgba(0,0,0,0.5);
    padding:8px 12px;
    border-radius:20px;
    text-decoration:none;
    font-size:12px;
}

/* ALT BAR */
.info-bar {
    position:absolute;
    bottom:40px;
    width:100%;
    height:50px;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    z-index:999;
}

.live {
    color:white;
    background:red;
    padding:3px 8px;
    font-size:12px;
    border-radius:3px;
}

/* KAYAN YAZI */
.ticker {
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:#0b1f44;
    overflow:hidden;
    display:flex;
    align-items:center;
}

.ticker-text {
    white-space:nowrap;
    color:white;
    padding-left:100%;
    animation:scroll 20s linear infinite;
    font-size:13px;
}

@keyframes scroll {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

/* SÜRE */
.time-box {
    position:absolute;
    bottom:90px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:4px 8px;
    font-size:12px;
    border-radius:3px;
}
</style>
</head>

<body>

<div class="top-nav">
    <a href="index.html" class="back-btn">⬅ Kanallar</a>
</div>

<div id="player"></div>

<div class="time-box" id="time">00:00</div>

<div class="info-bar">
    <div id="ch-name">CANLI YAYIN</div>
    <div class="live">● CANLI</div>
</div>

<div class="ticker">
    <div class="ticker-text">
        Trabzonspor açıklama yaptı • Warriors kazandı • Lebron 26 sayı • Bugün maçlar devam ediyor
    </div>
</div>

<script>
// URL parametreleri
const params = new URLSearchParams(window.location.search);
const stream = params.get("stream");
const name = params.get("name");

// kanal adını yaz
if(name){
    document.getElementById("ch-name").innerText = decodeURIComponent(name);
}

// Clappr başlat
var player = new Clappr.Player({
    source: stream,
    parentId: "#player",
    autoPlay: true,
    width: "100%",
    height: "100%",
});

// süre sayacı
setInterval(() => {
    if(player.getCurrentTime) {
        let t = Math.floor(player.getCurrentTime());
        let m = String(Math.floor(t/60)).padStart(2,'0');
        let s = String(t%60).padStart(2,'0');
        document.getElementById("time").innerText = m + ":" + s;
    }
}, 1000);
</script>

</body>
</html>
