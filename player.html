<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .video-js { width: 100vw !important; height: 100vh !important; }

        /* --- KONTROL BARI TASARIMI --- */
        .vjs-control-bar {
            background: linear-gradient(transparent, rgba(0,0,0,0.9)) !important;
            height: 60px !important;
            display: flex !important;
            align-items: center !important;
        }

        /* --- KIRMIZI VİDEO ÇİZGİSİ (Seek Bar) --- */
        .vjs-play-progress { background-color: #ff0000 !important; }
        .vjs-play-progress:before { color: #ff0000 !important; } /* Çizginin ucundaki yuvarlak */
        .vjs-slider { background-color: rgba(255,255,255,0.2) !important; height: 4px !important; }
        .vjs-load-progress { background: rgba(255,255,255,0.1) !important; } /* Yüklenen kısım rengi */

        /* --- SADE BÜYÜTEÇ (Tam Ekran) --- */
        .vjs-fullscreen-control { 
            order: 10 !important; 
            margin-right: 10px !important;
        }
        .vjs-fullscreen-control .vjs-icon-placeholder:before {
            font-size: 1.8em !important;
            line-height: 60px !important;
            color: #fff !important;
            content: "\f108" !important; /* VideoJS'in daha sade olan ikonu */
        }

        /* --- SES AYARI --- */
        .vjs-volume-panel { order: 9 !important; }

        /* --- CANLI NOKTASI --- */
        .live-label {
            position: absolute; bottom: 20px; left: 60px;
            display: flex; align-items: center; z-index: 1000; pointer-events: none;
        }
        .dot {
            width: 8px; height: 8px; background-color: #ff0000;
            border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px #ff0000;
            animation: pulse 1.5s infinite;
        }
        .live-text { color: white; font-size: 12px; font-weight: 900; letter-spacing: 1px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* --- GERİ DÖN BUTONU --- */
        .back-nav { position: absolute; top: 15px; left: 15px; z-index: 1000; transition: 0.3s; }
        .back-nav a {
            color: white; text-decoration: none; background: rgba(0,0,0,0.3);
            padding: 6px 12px; border-radius: 5px; font-size: 11px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Kontroller gizlenince diğerlerini de gizle */
        .vjs-user-inactive .back-nav, .vjs-user-inactive .live-label { opacity: 0; }
        .vjs-user-active .back-nav, .vjs-user-active .live-label { opacity: 1; }

        /* Ortadaki Oynat Butonu */
        .vjs-big-play-button {
            background-color: rgba(255, 0, 0, 0.7) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 70px !important; height: 70px !important;
            line-height: 70px !important; margin-top: -35px !important; margin-left: -35px !important;
        }
    </style>
</head>
<body>

    <div class="back-nav"><a href="index.html">⬅ Geri</a></div>

    <div class="live-label">
        <div class="dot"></div>
        <div class="live-text">CANLI</div>
    </div>

    <video id="vid" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('stream');

        const player = videojs('vid', {
            autoplay: true,
            controls: true,
            responsive: true,
            controlBar: {
                children: [
                    'playToggle',
                    'progressControl',
                    'volumePanel',
                    'fullscreenToggle',
                ],
            }
        });

        if(streamUrl) {
            player.src({ src: streamUrl, type: 'application/x-mpegURL' });
        }
    </script>
</body>
</html>
