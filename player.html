<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oynatıcı</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-js { width: 100vw !important; height: 100vh !important; }
        .back { position: absolute; top: 20px; left: 20px; z-index: 9999; color: white; text-decoration: none; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; font-family: sans-serif; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .vjs-theme-city .vjs-big-play-button { background-color: #2563eb !important; width: 80px !important; height: 80px !important; border-radius: 50% !important; line-height: 80px !important; margin-top: -40px !important; margin-left: -40px !important; }
    </style>
</head>
<body>
    <a href="index.html" class="back">⬅ GERİ</a>
    <video id="vid" class="video-js vjs-theme-city vjs-big-play-centered" controls preload="auto" playsinline></video>
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const link = new URLSearchParams(window.location.search).get('stream');
        if(link) {
            const p = videojs('vid');
            p.src({ src: link, type: 'application/x-mpegURL' });
            p.play();
        }
    </script>
</body>
</html>
