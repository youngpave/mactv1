<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Player</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .video-js { width: 100vw !important; height: 100vh !important; }

        /* KONTROL ÇUBUĞU - Siyah Şeffaf Bant */
        .vjs-control-bar {
            background: rgba(0, 0, 0, 0.7) !important;
            height: 55px !important;
            display: flex !important; /* Gizlenmeyi engeller */
            opacity: 1 !important;
            visibility: visible !important;
        }

        /* TAM EKRAN BUTONU (BÜYÜTME) - ZORLA GÖSTER */
        .vjs-fullscreen-control {
            display: block !important;
            order: 7 !important; /* En sağa al */
        }
        .vjs-fullscreen-control .vjs-icon-placeholder:before {
            font-size: 1.8em !important;
            line-height: 55px !important;
            color: white !important;
        }

        /* OYNAT BUTONU */
        .vjs-big-play-button {
            background-color: rgba(37, 99, 235, 0.8) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 70px !important; height: 70px !important;
            line-height: 70px !important; margin-top: -35px !important; margin-left: -35px !important;
        }

        /* CANLI YAZISI VE NOKTA */
        .live-label {
            position: absolute; bottom: 15px; left: 65px;
            display: flex; align-items: center; z-index: 10; pointer-events: none;
        }
        .dot {
            width: 8px; height: 8px; background-color: #ff0000;
            border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px #ff0000;
            animation: pulse 1.5s infinite;
        }
        .live-text { color: white; font-size: 12px; font-weight: 900; letter-spacing: 1px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* GERİ DÖN NAV */
        .back-nav { position: absolute; top: 15px; left: 15px; z-index: 100; }
        .back-nav a {
            color: white; text-decoration: none; background: rgba(0,0,0,0.4);
            padding: 6px 14px; border-radius: 4px; font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* KONTROLLER GİZLENİNCE CANLI YAZISINI GİZLE */
        .vjs-user-inactive .live-label, .vjs-user-inactive .back-nav { opacity: 0; transition: 0.3s; }
        .vjs-user-active .live-label, .vjs-user-active .back-nav { opacity: 1; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="back-nav"><a href="index.html">⬅ Geri</a></div>

    <div class="live-label">
        <div class="dot"></div>
        <div class="live-text">CANLI</div>
    </div>

    <video id="p" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const src = params.get('stream');

        if(src) {
            const player = videojs('p', {
                fluid: false,
                autoplay: true,
                controlBar: {
                    fullscreenToggle: true // Butonu aktif et
                }
            });

            player.src({ src: src, type: 'application/x-mpegURL' });
        }
    </script>
</body>
</html>
