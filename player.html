<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr-level-selector@latest/dist/level-selector.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
        
        .back-nav { position: absolute; top: 15px; left: 15px; z-index: 1000; }
        .back-nav a { 
            color: rgba(255,255,255,0.7); text-decoration: none; 
            background: rgba(0,0,0,0.5); padding: 6px 14px; 
            border-radius: 4px; font-family: sans-serif; font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="back-nav"><a href="index.html">⬅ Geri</a></div>
    <div id="player"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('stream');

        if (videoSrc) {
            var player = new Clappr.Player({
                source: videoSrc,
                parentId: "#player",
                // HlsjsPlayback eklendi, siyah ekranı bu çözer
                plugins: [HlsjsPlayback, LevelSelector],
                autoPlay: true,
                mute: false, // Sesli başlasın
                width: '100%',
                height: '100%',
                hlsjsConfig: {
                    enableWorker: true,
                    lowLatencyMode: true,
                },
                mimeType: "application/x-mpegURL",
                mediacontrol: {seekbar: "#2563eb", buttons: "#fff"},
            });
        }
    </script>
</body>
</html>
