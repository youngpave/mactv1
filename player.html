<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaçTV | Clappr Pro</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr-level-selector@latest/dist/level-selector.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        #player { width: 100vw; height: 100vh; }

        /* beIN SPORTS Tarzı Alt Bant Tasarımı */
        .info-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 60px; background: rgba(10, 10, 10, 0.9);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 999;
            border-top: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }

        .info-left { display: flex; align-items: center; gap: 12px; }
        .logo-tag { background: #fff; color: #000; padding: 3px 8px; border-radius: 4px; font-weight: 900; font-size: 14px; }
        .channel-name { color: #eee; font-weight: bold; font-size: 14px; letter-spacing: 0.5px; }

        .info-right { display: flex; align-items: center; gap: 8px; }
        .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 10px #ef4444; animation: blink 1.2s infinite; }
        .live-text { color: #fff; font-weight: bold; font-size: 12px; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Geri Dön Butonu */
        .back-nav { position: absolute; top: 20px; left: 20px; z-index: 1000; }
        .back-nav a { 
            color: white; text-decoration: none; background: rgba(255,255,255,0.1); 
            padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: bold;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }

        /* Clappr Kontrollerini Özelleştirme (Mavi Tema) */
        .clappr-controls[data-controls] .seekbar-bar { background-color: #2563eb !important; }
        .clappr-controls[data-controls] .drawer-icon-color { fill: #2563eb !important; }
    </style>
</head>
<body>

    <div class="back-nav"><a href="index.html">⬅ KANALLAR</a></div>

    <div id="player"></div>

    <div class="info-overlay">
        <div class="info-left">
            <div class="logo-tag">MT</div>
            <div class="channel-name">CANLI YAYIN</div>
        </div>
        <div class="info-right">
            <div class="live-dot"></div>
            <div class="live-text">CANLI</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('stream');

        if (videoSrc) {
            var player = new Clappr.Player({
                source: videoSrc,
                parentId: "#player",
                plugins: [LevelSelector],
                autoPlay: true,
                width: '100%',
                height: '100%',
                preload: 'auto',
                mimeType: "application/x-mpegURL",
                levelSelectorConfig: {
                    title: 'Kalite',
                    labels: {
                        2: 'High',
                        1: 'Medium',
                        0: 'Low',
                    },
                },
                mediacontrol: {seekbar: "#2563eb", buttons: "#fff"},
                playbackNotSupportedMessage: 'Yayın şu an aktif değil veya tarayıcınız desteklemiyor.',
            });
        }
    </script>
</body>
</html>
