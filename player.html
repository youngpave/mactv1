<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr-level-selector@latest/dist/level-selector.min.js"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        
        #player { width: 100vw; height: 100vh; }

        /* Geri Dön Butonu - Sadece gerekli olduğunda görünür */
        .back-nav { 
            position: absolute; top: 15px; left: 15px; z-index: 1000; 
        }
        .back-nav a { 
            color: rgba(255,255,255,0.6); text-decoration: none; 
            background: rgba(0,0,0,0.4); padding: 5px 12px; 
            border-radius: 5px; font-family: sans-serif; font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .back-nav a:hover { color: #fff; background: rgba(0,0,0,0.8); }

        /* Clappr Stil Ayarları */
        .clappr-controls[data-controls] { background: linear-gradient(transparent, rgba(0,0,0,0.7)) !important; }
    </style>
</head>
<body>

    <div class="back-nav"><a href="index.html">⬅ Geri</a></div>

    <div id="player"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('stream');

        if (videoSrc) {
            var player = new Clappr.Player({
                source: videoSrc,
                parentId: "#player",
                plugins: [LevelSelector],
                autoPlay: true,
                width: '100%',
                height: '100%',
                preload: 'auto',
                mimeType: "application/x-mpegURL",
                levelSelectorConfig: {
                    title: 'Kalite',
                    labels: {
                        2: '720p',
                        1: '480p',
                        0: '360p',
                    },
                },
                mediacontrol: {seekbar: "#3b82f6", buttons: "#fff"},
            });
        }
    </script>
</body>
</html>
