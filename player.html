<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Player</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        .video-js { width: 100vw !important; height: 100vh !important; }

        /* KONTROL ÇUBUĞU */
        .vjs-control-bar {
            background: rgba(0, 0, 0, 0.7) !important;
            height: 55px !important;
            display: flex !important;
        }

        /* ÖZEL TAM EKRAN BUTONU (SAĞ ALT KÖŞEYE SABİT) */
        .custom-fullscreen {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 2000;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }
        
        /* Büyütme İkonu (SVG) */
        .custom-fullscreen svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* CANLI YAZISI VE NOKTA */
        .live-label {
            position: absolute; bottom: 20px; left: 65px;
            display: flex; align-items: center; z-index: 1000; pointer-events: none;
        }
        .dot {
            width: 8px; height: 8px; background-color: #ff0000;
            border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px #ff0000;
            animation: pulse 1.5s infinite;
        }
        .live-text { color: white; font-size: 12px; font-weight: 900; letter-spacing: 1px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* GERİ DÖN NAV */
        .back-nav { position: absolute; top: 15px; left: 15px; z-index: 1000; }
        .back-nav a {
            color: white; text-decoration: none; background: rgba(0,0,0,0.4);
            padding: 6px 14px; border-radius: 4px; font-size: 11px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* KONTROLLER GİZLENİNCE HEPSİNİ GİZLE */
        .vjs-user-inactive .live-label, 
        .vjs-user-inactive .back-nav, 
        .vjs-user-inactive .custom-fullscreen { 
            opacity: 0; visibility: hidden; transition: 0.3s; 
        }
        
        .vjs-user-active .live-label, 
        .vjs-user-active .back-nav, 
        .vjs-user-active .custom-fullscreen { 
            opacity: 1; visibility: visible; transition: 0.3s; 
        }

        /* Video.js'in kendi butonunu gizleyelim karışmasın */
        .vjs-fullscreen-control { display: none !important; }
    </style>
</head>
<body>

    <div class="back-nav"><a href="index.html">⬅ GERİ</a></div>

    <div class="live-label">
        <div class="dot"></div>
        <div class="live-text">CANLI</div>
    </div>

    <div class="custom-fullscreen" id="fs-btn">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </div>

    <video id="p" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const src = params.get('stream');
        const player = videojs('p', {
            fluid: false,
            autoplay: true,
            controls: true
        });

        if(src) {
            player.src({ src: src, type: 'application/x-mpegURL' });
        }

        // TAM EKRAN FONKSİYONU
        const fsBtn = document.getElementById('fs-btn');
        fsBtn.addEventListener('click', function() {
            if (!player.isFullscreen()) {
                player.requestFullscreen();
            } else {
                player.exitFullscreen();
            }
        });
    </script>
</body>
</html>
