
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --card: #121620; --blue: #2563eb; --gray: #94a3b8; }
        html, body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }
        #player-container { 
            width: 100%; background: #000; position: fixed; top: env(safe-area-inset-top); 
            z-index: 1000; display: flex; justify-content: center;
        }
        @media (max-width: 1023px) { #player-container { aspect-ratio: 16 / 9; } }
        @media (min-width: 1024px) { #player-container { height: 400px; } }
        .video-js { width: 100% !important; height: 100% !important; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #000; }
        
        .container { 
            height: 100vh; overflow-y: auto; padding: 15px; box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }
        @media (max-width: 1023px) { .container { padding-top: calc(56.25vw + 10px); } }
        @media (min-width: 1024px) { .container { padding-top: 410px; max-width: 800px; margin: 0 auto; } }

        /* YAN YANA BUTONLAR */
        .tab-wrapper { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { 
            flex: 1; padding: 12px; border-radius: 10px; background: var(--card); 
            border: 1px solid rgba(255,255,255,0.1); color: var(--gray);
            font-weight: 700; font-size: 12px; cursor: pointer; text-align: center;
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

        .list-section { display: none; }
        .list-section.active { display: block; }

        .ch-card { 
            background: var(--card); display: flex; align-items: center; padding: 14px; 
            border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
        }
        .icon { 
            width: 38px; height: 38px; background: linear-gradient(135deg, var(--blue), #1e40af); 
            border-radius: 8px; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px;
        }
        .info { flex: 1; }
        .title { display: block; font-size: 14px; font-weight: 600; }
        .tag { font-size: 9px; color: var(--gray); text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline webkit-playsinline></video>
        <iframe id="external-frame" allowfullscreen></iframe>
    </div>

    <div class="container">
        <div class="tab-wrapper">
            <div class="tab-btn active" onclick="switchTab('vip')">VIP KANALLAR</div>
            <div class="tab-btn" onclick="switchTab('iptv')">IPTV Yayınları</div>
        </div>

        <div id="vip-section" class="list-section active"></div>
        <div id="iptv-section" class="list-section"></div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

        ];

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.list-section').forEach(sec => sec.classList.remove('active'));
            
            if(type === 'vip') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('vip-section').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('iptv-section').classList.add('active');
            }
        }

        function playChannel(url, isIPTV) {
            if (isIPTV) {
                window.open(url, '_blank');
                return;
            }
            const isVideo = url.toLowerCase().includes('.m3u8');
            if (isVideo) {
                iframe.style.display = 'none';
                videoElement.style.display = 'block';
                videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videoPlayer.load();
                videoPlayer.play().catch(e => console.log(e));
            } else {
                videoPlayer.pause();
                videoElement.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;
            }
        }

        function renderList(list, containerId, isIPTV) {
            const container = document.getElementById(containerId);
            list.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'ch-card';
                card.onclick = () => playChannel(ch.url, isIPTV);
                card.innerHTML = `
                    <div class="icon">${ch.name.substring(0,2)}</div>
                    <div class="info">
                        <span class="title">${ch.name}</span>
                        <span class="tag">${isIPTV ? 'YÖNLENDİRME' : 'VIP KANAL'}</span>
                    </div>
                    <div style="color:var(--blue)">${isIPTV ? '🔗' : '▶'}</div>
                `;
                container.appendChild(card);
            });
        }

        renderList(vipChannels, 'vip-section', false);
        renderList(iptvChannels, 'iptv-section', true);
    </script>
</body>
</html>
