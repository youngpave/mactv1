<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAÇTV | Full Panel</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --card: #121620; --blue: #2563eb; --gray: #94a3b8; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* GÖMÜLÜ PLAYER */
        #player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--blue); }
        .video-js { width: 100% !important; height: 100% !important; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #000; }

        /* KANAL LİSTESİ */
        .container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 30px; }
        .ch-card { background: var(--card); display: flex; align-items: center; padding: 14px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .ch-card:active { transform: scale(0.96); background: #1a202e; }
        
        .icon { width: 35px; height: 35px; background: linear-gradient(135deg, var(--blue), #1e40af); border-radius: 8px; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .info { flex: 1; }
        .title { display: block; font-size: 14px; font-weight: 600; }
        .tag { font-size: 8px; color: var(--gray); text-transform: uppercase; }
        
        /* PLAYER KIRMIZI ÇİZGİ */
        .vjs-play-progress { background-color: #ff0000 !important; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
        <iframe id="external-frame" allowfullscreen></iframe>
    </div>

    <div class="container" id="channel-list"></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>

        const videoElement = document.getElementById('my-video');

        ];

        function playChannel(url) {
            const isVideo = url.includes('.m3u8') || url.includes('get.php');
            if (isVideo) {
                iframe.style.display = 'none';
                videoElement.style.display = 'block';
                videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videoPlayer.play();
            } else {
                videoPlayer.pause();
                videoElement.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;
            }
        }

        const listDiv = document.getElementById('channel-list');
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'ch-card';
            card.onclick = () => playChannel(ch.url);
            
            card.innerHTML = `
                <div class="icon">${ch.name.charAt(0)}</div>
                <div class="info">
                    <span class="title">${ch.name}</span>
                    <span class="tag">MAÇTV Yayın Hattı</span>
                </div>
                <div style="color:var(--blue)">▶</div>
            `;
            listDiv.appendChild(card);
        });
    </script>
