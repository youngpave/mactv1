<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaçTV - Canlı Yayın</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: #1e293b; 
            --accent-blue: #3b82f6; 
            --live-red: #ef4444; 
            --icon-purple: #8b5cf6;
        }
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif; }
        header { display: flex; align-items: center; gap: 12px; padding: 15px 20px; background: var(--bg-dark); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-box { background: #fff; color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 18px; }
        .site-title { color: var(--accent-blue); font-size: 20px; font-weight: bold; }
        .player-section { position: relative; width: 100%; max-width: 900px; margin: 0 auto; background: #000; }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        .refresh-btn { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 10; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .list-header { padding: 25px 20px 10px; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
        .ch-count { font-size: 14px; opacity: 0.5; }
        .channels-wrapper { padding: 0 15px 50px; display: flex; flex-direction: column; gap: 10px; }
        .channel-card { background: var(--card-bg); padding: 14px 18px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .ch-details { display: flex; align-items: center; gap: 15px; }
        .play-btn-icon { background: var(--icon-purple); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .ch-title { font-size: 16px; font-weight: 600; }
        .live-pill { background: var(--live-red); color: white; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">MT</div>
    <div class="site-title">MaçTV</div>
</header>

<div class="player-section">
    <div class="refresh-btn" onclick="location.reload();">🔄 Yayın Açılmıyorsa Yenile</div>
    <video id="main-player" class="video-js vjs-big-play-centered" controls preload="auto"></video>
</div>

<div class="list-header">7/24 Kanallar <span class="ch-count" id="count"></span></div>
<div class="channels-wrapper" id="list"></div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
