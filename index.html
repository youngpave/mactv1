<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAÇTV Test</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; padding: 20px; }
        .ch-card { background: #121620; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; border: 1px solid #2563eb; }
    </style>
</head>
<body>
    <h1>MAÇTV KANAL LİSTESİ</h1>
    <div id="channel-list">Yükleniyor...</div>

    <script>
        const channels = [
            { name: "BEIN SPORTS 1 HD", url: "https://v2.trendy47.com/event/alanyaspor-vs-trabzonspor-football-1394685" },
            { name: "TRT SPOR", url: "https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8" }
        ];

        const listDiv = document.getElementById('channel-list');
        
        try {
            listDiv.innerHTML = '';
            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'ch-card';
                card.innerText = ch.name;
                card.onclick = () => {
                    if (ch.url.includes('.m3u8')) {
                        window.location.href = "player.html?stream=" + encodeURIComponent(ch.url);
                    } else {
                        window.location.href = ch.url;
                    }
                };
                listDiv.appendChild(card);
            });
        } catch (err) {
            listDiv.innerText = "Hata oluştu: " + err;
        }
    </script>
</body>
</html>
