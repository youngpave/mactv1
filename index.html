<!DOCTYPE html>

    <title>MaçTV - Canlı Yayın</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; --card-bg: #1e293b; 
            --accent-blue: #3b82f6; --live-red: #ef4444; 
            --icon-purple: #8b5cf6;
        }
        
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        header { display: flex; align-items: center; gap: 12px; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-box { background: #fff; color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 900; }
        .site-title { color: var(--accent-blue); font-size: 20px; font-weight: bold; }

        /* Oynatıcı Alanı */
        .player-section { position: relative; width: 100%; max-width: 900px; margin: 0 auto; background: #000; z-index: 10; }
        .video-js, #external-player { width: 100%; aspect-ratio: 16/9; display: block; border: none; }

        /* --- F11 / ZORLA YAN DÖNDÜRME MODU --- */
        .fullscreen-active {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            z-index: 99999 !important; background: #000 !important;
            display: flex !important; align-items: center; justify-content: center;
        }

        /* Telefon DİK konumdayken videoyu 90 derece döndür */
        @media screen and (orientation: portrait) {
            .fullscreen-active #external-player, 
            .fullscreen-active .video-js,
            .fullscreen-active #vjs-box {
                width: 100vh !important;
                height: 100vw !important;
                transform: rotate(90deg);
                transform-origin: center;
            }
        }

        /* Telefon zaten YATAY ise döndürme yapma */
        @media screen and (orientation: landscape) {
            .fullscreen-active #external-player, 
            .fullscreen-active .video-js,
            .fullscreen-active #vjs-box {
                width: 100vw !important;
                height: 100vh !important;
                transform: none;
            }
        }

        /* Kapatma Butonu (Tam ekranda videonun üzerinde kalması için ayarlandı) */
        #close-fs {
            display: none; position: fixed; top: 20px; left: 20px; z-index: 100000;
            background: rgba(239, 68, 68, 0.9); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* Tam Ekran Tetikleyici Buton */
        #fs-trigger-btn {
            display: none; width: calc(100% - 30px); margin: 15px auto; 
            background: var(--accent-blue); color: white; border: none; 
            padding: 14px; border-radius: 12px; font-weight: bold; 
            text-align: center; cursor: pointer; font-size: 16px;
        }

        .list-header { padding: 25px 20px 10px; font-size: 20px; font-weight: bold; }
        .channels-wrapper { padding: 0 15px 50px; display: flex; flex-direction: column; gap: 10px; }
        .channel-card {
            background: var(--card-bg); padding: 14px 18px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.03);
        }
        .ch-details { display: flex; align-items: center; gap: 15px; }
        .play-btn-icon { background: var(--icon-purple); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    const fsBtn = document.getElementById('fs-trigger-btn');
    const playerContainer = document.getElementById('player-container');
    const closeFsBtn = document.getElementById('close-fs');

    function toggleFs(status) {
        if (status) {
            playerContainer.classList.add('fullscreen-active');
            closeFsBtn.style.display = 'block';
            // Adres çubuğunu biraz olsun gizlemek için hafif kaydır
            window.scrollTo(0, 1);
        } else {
            playerContainer.classList.remove('fullscreen-active');

            window.scrollTo(0, 0);
        }
    }

    function loadChannel(ch) {
        toggleFs(false);

        if (ch.isIframe) {
            player.pause();
            vjsBox.style.display = 'none';
            iframePlayer.style.display = 'block';
            iframePlayer.src = ch.url;
            fsBtn.style.display = 'block';
        } else {
            fsBtn.style.display = 'none';
            iframePlayer.style.display = 'none';
            iframePlayer.src = '';
            vjsBox.style.display = 'block';
            player.src({ src: ch.url, type: 'application/x-mpegURL' });
            player.play();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    channels.forEach(ch => {
        const card = document.createElement('div');

        card.innerHTML = `<div class="ch-details"><div class="play-btn-icon">▶</div><span>${ch.name}</span></div>`;
