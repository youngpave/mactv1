<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaçTV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; }
        .header { padding: 15px; background: #1e293b; text-align: center; font-weight: bold; font-size: 20px; color: #3b82f6; }
        .player-box { width: 100%; max-width: 800px; margin: 0 auto; background: #000; }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        .list-container { padding: 15px; }
        .channel-item { 
            background: #1e293b; padding: 15px; margin-bottom: 8px; 
            border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between;
        }
        .live-label { color: #ef4444; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">MT - MaçTV</div>

<div class="player-box">
    <video id="my-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
</div>

<div class="list-container" id="channel-list">
    </div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>
    // 1. Kanallar ve Proxyler
    var proxies = [
        "https://hlsmm-ffff.hf.space/proxy/m3u?url=",
        "https://hlsmm-lah.hf.space/proxy/m3u?url="
    ];

    var myChannels = [
        { n: "BEIN SPORTS 1", u: "http://serelfhdtv.shop:8080/live/dg1611/8nTrqTpMsJwv/35762.m3u8" },
        { n: "BEIN SPORTS 3", u: "http://185.160.192.64:80/live/DAE54374785/DAR65386775/79462.m3u8" },
        { n: "TV8.5", u: "https://rkhubpaomb.turknet.ercdn.net/fwjkgpasof/tv8bucuk/tv8bucuk.m3u8" },
        { n: "TRT 1", u: "https://tv-trt1.medya.trt.com.tr/master_1080.m3u8" },
        { n: "TABİİ SPOR", u: "https://kl9mr2vxw7nq5py1sh4tj3gb6.medya.trt.com.tr/master_720p.m3u8" }
    ];

    // 2. Oynatıcıyı Hazırla
    var player = videojs('my-player');

    // 3. Oynatma Fonksiyonu
    function playNow(name, url) {
        var finalUrl = url;
        
        // Sadece bu iki kanal için proxy
        if (name === "BEIN SPORTS 1" || name === "BEIN SPORTS 3") {
            var randomP = proxies[Math.floor(Math.random() * proxies.length)];
            finalUrl = randomP + encodeURIComponent(url);
        }

        player.src({ src: finalUrl, type: 'application/x-mpegURL' });
        player.play();
        window.scrollTo(0,0);
    }

    // 4. Listeyi Ekrana Bas (Eski usul for döngüsü - en güvenlisi)
    var listEl = document.getElementById('channel-list');
    for (var i = 0; i < myChannels.length; i++) {
        (function(index) {
            var ch = myChannels[index];
            var div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = '<span>▶ ' + ch.n + '</span><span class="live-label">CANLI</span>';
            div.onclick = function() {
                playNow(ch.n, ch.u);
            };
            listEl.appendChild(div);
        })(i);
    }
</script>

</body>
</html>
