<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --card: #121620; --blue: #2563eb; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        #player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 100; }
        .video-js { width: 100% !important; height: 100% !important; }
        .container { padding: 15px; }
        .ch-card { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            margin-bottom: 10px; display: flex; align-items: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .ch-icon { width: 40px; height: 40px; background: var(--blue); border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <video id="tv-player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
</div>

<div class="container" id="list"></div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const player = videojs('tv-player', {
        html5: { vhs: { overrideNative: true } }
    });

    const channels = [
        { name: "IPTV BEIN SPORTS 1", url: "http://anadolutv.shop:8080/live/9MeKCDLG5s/ZrGS6R8FZ5/334642.m3u8" },
        { name: "TRT SPOR HD", url: "https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8" },
        { name: "TV 8.5", url: "https://rkhubpaomb.turknet.ercdn.net/fwjkgpasof/tv8bucuk/tv8bucuk.m3u8" }
    ];

    function play(url) {
        // Docker'da 7860 portunu kullandığın için yolu buna göre çekiyoruz
        // Eğer index.html ve Python aynı sunucudaysa sadece path yeterli
        const proxyUrl = "/proxy/m3u?url=" + encodeURIComponent(url);
        
        player.src({ src: proxyUrl, type: 'application/x-mpegURL' });
        player.load();
        player.play();
    }

    const listDiv = document.getElementById('list');
    channels.forEach(ch => {
        listDiv.innerHTML += `
            <div class="ch-card" onclick="play('${ch.url}')">
                <div class="ch-icon">${ch.name.substring(0,2)}</div>
                <div><b>${ch.name}</b><br><small style="color:gray">CANLI YAYIN</small></div>
            </div>`;
    });
</script>
</body>
</html>
