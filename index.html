<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaçTV - Canlı Yayın</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: #1e293b; 
            --accent-blue: #3b82f6; 
            --live-red: #ef4444; 
            --icon-purple: #8b5cf6;
        }
        
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        header { 
            display: flex; align-items: center; gap: 12px; padding: 15px 20px; 
            background: var(--bg-dark); border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .logo-box { background: #fff; color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 18px; }
        .site-title { color: var(--accent-blue); font-size: 20px; font-weight: bold; }

        .player-section { position: relative; width: 100%; max-width: 900px; margin: 0 auto; background: #000; }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        
        .refresh-btn {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px);
            padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 10;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white;
        }

        .overlay-tags {
            position: absolute; bottom: 55px; left: 20px; display: flex; align-items: center; gap: 15px; 
            z-index: 10; pointer-events: none; font-weight: bold;
        }
        .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .pulse-dot { width: 10px; height: 10px; background: var(--live-red); border-radius: 50%; animation: pulse 1s infinite; }

        .list-header { padding: 25px 20px 10px; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
        .channels-wrapper { padding: 0 15px 50px; display: flex; flex-direction: column; gap: 10px; }
        .channel-card {
            background: var(--card-bg); padding: 14px 18px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.2s ease; border: 1px solid rgba(255,255,255,0.03);
        }
        .ch-details { display: flex; align-items: center; gap: 15px; }
        .play-btn-icon { 
            background: var(--icon-purple); width: 38px; height: 38px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center;
        }
        .live-pill { background: var(--live-red); color: white; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; }

        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>
<body>

<header>
    <div class="logo-box">MT</div>
    <div class="site-title">MaçTV</div>
</header>

<div class="player-section">
    <div class="refresh-btn" onclick="location.reload();">
        🔄 Yayın Açılmıyorsa Butona Tıkla
    </div>
    <video id="main-player" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    <div class="overlay-tags">
        <div class="live-indicator"><div class="pulse-dot"></div> CANLI</div>
        <div class="hd-label">HD</div>
    </div>
</div>

<div class="list-header">
    7/24 Kanallar <span class="ch-count" id="count"></span>
</div>

<div class="channels-wrapper" id="list"></div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    // 🚀 BİSMİLLAH: CORS ENGELLEYİCİ BOTU (SERVICE WORKER) UYANDIRMA KODU
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log("CORS Botu Başarıyla Uyandırıldı!"))
                .catch(err => console.log("Bot Uyanırken Hata Oluştu:", err));
        });
    }

    const channels = [
        // SENİN VERDİĞİN ÖZEL IPTV LİNKİ (BOT SAYESİNDE ÇALIŞACAK)
        { name: "ÖZEL IPTV (BOTLU)", url: "http://nordsohzace.top:8080/live/8531748968927785/afb62d9c2dee/62817.m3u8" },
        
        { name: "BEIN SPORTS 1", url: "https://hlsmm-ffff.hf.space/proxy/m3u?url=http://serelfhdtv.shop:8080/live/dg1611/8nTrqTpMsJwv/35762.m3u8" },
        { name: "BEIN SPORTS 3", url: "https://Hlsmm-lah.hf.space/proxy/m3u?url=http://185.160.192.64:80/live/DAE54374785/DAR65386775/79462.m3u8" },
        { name: "S SPORT Plus", url: "https://andro.0638527.xyz/checklist/androstreamlivessplus1.m3u8" },
        { name: "TV8.5", url: "https://rkhubpaomb.turknet.ercdn.net/fwjkgpasof/tv8bucuk/tv8bucuk.m3u8" }
    ];

    const player = videojs('main-player', { fluid: true });
    const listDiv = document.getElementById('list');
    document.getElementById('count').innerText = `${channels.length} kanal`;

    function buildChannels() {
        listDiv.innerHTML = "";
        channels.forEach((ch) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <div class="ch-details">
                    <div class="play-btn-icon">▶</div>
                    <span class="ch-title">${ch.name}</span>
                </div>
                <div class="live-pill">CANLI</div>
            `;
            card.onclick = () => {
                player.src({ src: ch.url, type: 'application/x-mpegURL' });
                player.play();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            listDiv.appendChild(card);
        });
    }

    buildChannels();
</script>
</body>
</html>
