<!DOCTYPE html>

    <title>MAÇTV | Full VIP Panel</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --card: #121620; --blue: #2563eb; --gray: #94a3b8; --red: #ef4444; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        #player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--blue); }
        .video-js { width: 100% !important; height: 100% !important; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #000; }

        .tabs { display: flex; background: #0f121a; padding: 2px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { flex: 1; padding: 14px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; color: var(--gray); transition: 0.3s; letter-spacing: 1px; }
        .tab-btn.active { color: #fff; background: var(--blue); border-radius: 5px; }

        .container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 50px; }
        .ch-card { background: var(--card); display: flex; align-items: center; padding: 14px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .ch-card:active { transform: scale(0.96); background: #1a202e; }
        .icon { width: 35px; height: 35px; background: linear-gradient(135deg, var(--blue), #1e40af); border-radius: 8px; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .icon.yedek { background: linear-gradient(135deg, var(--red), #991b1b); }
        .info { flex: 1; }
        .title { display: block; font-size: 14px; font-weight: 600; }
        .tag { font-size: 8px; color: var(--gray); text-transform: uppercase; }
        
        .vjs-play-progress { background-color: #ff0000 !important; }
    </style>
</head>
<body>

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        function playChannel(url) {
            const isVideo = url.includes('.m3u8') || url.includes('get.php');
            if (isVideo) {
                iframe.style.display = 'none';
                videoElement.style.display = 'block';
                videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videoPlayer.play();
            } else {
                videoPlayer.pause();
                videoElement.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;
            }
        }

        function switchTab(type, btn) {
            if (type === 'ios' && !isIOS) {
                alert("Bu bölüm sadece iPhone/iPad cihazlarda çalışır.");
                return;
            }
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const listDiv = document.getElementById('channel-list');
            listDiv.innerHTML = '';

            channels[type].forEach(ch => {
                const card = document.createElement('div');
                card.className = 'ch-card';
                card.onclick = () => playChannel(ch.url);
                const isBackup = ch.type === "Backup";
                card.innerHTML = `
                    <div class="icon ${isBackup ? 'yedek' : ''}">${isBackup ? 'Y' : ch.name.charAt(0)}</div>
                    <div class="info">
                        <span class="title">${ch.name}</span>
                        <span class="tag">${isBackup ? 'Yedek Hat (CF)' : 'MAÇTV Player'}</span>
                    </div>
                    <div style="color:${isBackup ? 'var(--red)' : 'var(--blue)'}">▶</div>
                `;
                listDiv.appendChild(card);
            });
        }
        window.onload = () => switchTab('genel', document.querySelector('.tab-btn'));
    </script>
