    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { 
            --bg-dark: #0f172a; --card-bg: #1e293b; 
            --accent-blue: #3b82f6; --live-red: #ef4444; 
            --icon-purple: #8b5cf6;
        }
        
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        header { display: flex; align-items: center; gap: 12px; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-box { background: #fff; color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 900; }
        .site-title { color: var(--accent-blue); font-size: 20px; font-weight: bold; }

        .player-section { position: relative; width: 100%; max-width: 900px; margin: 0 auto; background: #000; z-index: 10; }
        .video-js, #external-player { width: 100%; aspect-ratio: 16/9; display: block; border: none; }

        .list-header { padding: 25px 20px 10px; font-size: 20px; font-weight: bold; }
        .channels-wrapper { padding: 0 15px 50px; display: flex; flex-direction: column; gap: 10px; }
        .channel-card {
            background: var(--card-bg); padding: 14px 18px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.03);
        }
        .ch-details { display: flex; align-items: center; gap: 15px; }
        .play-btn-icon { background: var(--icon-purple); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>

    const player = videojs('main-player', { fluid: true });
    const listDiv = document.getElementById('list');

    const iframePlayer = document.getElementById('external-player');

    function loadChannel(ch) {
        // OTOMATİK TESPİT: Link m3u8 veya mp4 içermiyorsa iframe olarak yükle
        const isIframeLink = !ch.url.toLowerCase().includes('.m3u8') && !ch.url.toLowerCase().includes('.mp4');

        if (isIframeLink) {
            player.pause();
            vjsBox.style.display = 'none';
            iframePlayer.style.display = 'block';
            iframePlayer.src = ch.url;
        } else {
            iframePlayer.style.display = 'none';
            iframePlayer.src = '';
            vjsBox.style.display = 'block';
            player.src({ src: ch.url, type: 'application/x-mpegURL' });
            player.play();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    channels.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `<div class="ch-details"><div class="play-btn-icon">▶</div><span>${ch.name}</span></div>`;
        card.onclick = () => loadChannel(ch);

    });

    document.getElementById('count').innerText = `${channels.length} Kanal`;
