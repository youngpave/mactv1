<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --card: #121620; --blue: #2563eb; --gray: #94a3b8; }
        html, body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }
        #player-container { 
            width: 100%; background: #000; position: fixed; top: env(safe-area-inset-top); 
            z-index: 1000; display: flex; justify-content: center;
        }
        @media (max-width: 1023px) { #player-container { aspect-ratio: 16 / 9; } }
        @media (min-width: 1024px) { #player-container { height: 400px; } }
        .video-js { width: 100% !important; height: 100% !important; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #000; }
        .container { 
            height: 100vh; overflow-y: auto; padding: 15px; box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }
        @media (max-width: 1023px) { .container { padding-top: calc(56.25vw + 10px); } }
        @media (min-width: 1024px) { .container { padding-top: 410px; max-width: 800px; margin: 0 auto; } }
        .section-title { font-size: 12px; color: var(--blue); font-weight: 700; margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--blue); padding-left: 10px; }
        .ch-card { 
            background: var(--card); display: flex; align-items: center; padding: 14px; 
            border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
        }
        .icon { 
            width: 38px; height: 38px; background: linear-gradient(135deg, var(--blue), #1e40af); 
            border-radius: 8px; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px;
        }
        .info { flex: 1; }
        .title { display: block; font-size: 14px; font-weight: 600; }
        .tag { font-size: 9px; color: var(--gray); text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline webkit-playsinline></video>
        <iframe id="external-frame" allowfullscreen></iframe>
    </div>

    <div class="container">
        <div class="section-title">VIP SPOR KANALLARI</div>
        <div id="vip-list"></div>
        
        <div class="section-title">IPTV ÖZEL BÖLÜM (Yönlendirme)</div>
        <div id="iptv-list"></div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const videoPlayer = videojs('my-video');
        const iframe = document.getElementById('external-frame');
        const videoElement = document.getElementById('my-video');

        const vipChannels = [
            // beIN Grubu
            { name: "BEIN SPORTS HABER", url: "https://www.canlitv.diy/player/iframe.php?url=https://www.youtube.com/embed/i7UpPgxfZZ8" },
            { name: "BEIN SPORTS 1 HD", url: "https://zonalive.click/player/33/151" },
            { name: "BEIN SPORTS 1 YEDEK", url: "https://selcuksports179.top/matches?id=bein-sports-1" },
            { name: "BEIN SPORTS 2 HD", url: "https://zonalive.click/player/33/152" },
            { name: "BEIN SPORTS 3 HD", url: "https://antenasport.org/beinsport3tr.php" },
            { name: "BEIN SPORTS 4 HD", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedebs4.m3u8" },
            { name: "BEIN SPORTS 5 HD", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedebs5.m3u8" },
            { name: "BEIN SPORTS MAX 1", url: "https://selcuksports179.top/matches?id=bein-sports-max-1" },
            { name: "BEIN SPORTS MAX 2", url: "https://selcuksports179.top/matches?id=bein-sports-max-2" },
            
            // Tivibu & S Sport
            { name: "TİVİBU SPOR 1", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedets1.m3u8" },
            { name: "TİVİBU SPOR 2", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedets2.m3u8" },
            { name: "TİVİBU SPOR 3", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedets3.m3u8" },
            { name: "TİVİBU SPOR 4", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedets4.m3u8" },
            { name: "S SPORT 1 HD", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedess1.m3u8" },
            { name: "S SPORT 2 HD", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedess2.m3u8" },

            // Tabii & TRT & TV8.5
            { name: "TABİİ SPOR 1", url: "https://74betorspintv.live/channel?id=ex1" },
            { name: "TABİİ SPOR 2", url: "https://mr8bv4kl1nq7sh9tw2xp5zj6g.medya.trt.com.tr/master_1440p.m3u8" },
            { name: "TABİİ SPOR 3", url: "https://mr4vl7nq2sh9tw5xp1zk3gj8b.medya.trt.com.tr/master_1440p.m3u8" },
            { name: "TRT SPOR", url: "https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8" },
            { name: "TV8.5 HD", url: "https://rkhubpaomb.turknet.ercdn.net/fwjkgpasof/tv8bucuk/tv8bucuk.m3u8" },

            // DAZN & Sky
            { name: "DAZN 1", url: "https://la14hd.com/vivo/canales.php?stream=dazn1" },
            { name: "SKY SPORTS F1", url: "https://streamcrichd.com/update/skyf1.php" }
        ];

        // IPTV BÖLÜMÜ - BURAYA EKLEYECEĞİN KANALLAR DİREKT YÖNLENDİRME YAPAR
        const iptvChannels = [

  { name: 
" IPTV MAX 1", url: "https://selcuksports179.top/matches?id=bein-sports-max-1" },

            // Örnek: { name: "IPTV KANALIM", url: "https://link-buraya.com" },
        ];

        function playChannel(url, isIPTV) {
            if (isIPTV) {
                window.open(url, '_blank');
                return;
            }

            const isVideo = url.toLowerCase().includes('.m3u8');
            if (isVideo) {
                iframe.style.display = 'none';
                videoElement.style.display = 'block';
                videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videoPlayer.load();
                videoPlayer.play().catch(e => console.log(e));
            } else {
                videoPlayer.pause();
                videoElement.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;
            }
        }

        function renderList(list, containerId, tagText, isIPTV) {
            const container = document.getElementById(containerId);
            list.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'ch-card';
                card.onclick = () => playChannel(ch.url, isIPTV);
                card.innerHTML = `
                    <div class="icon">${ch.name.substring(0,2)}</div>
                    <div class="info">
                        <span class="title">${ch.name}</span>
                        <span class="tag">${tagText}</span>
                    </div>
                    <div style="color:var(--blue)">${isIPTV ? '🔗' : '▶'}</div>
                `;
                container.appendChild(card);
            });
        }

        renderList(vipChannels, 'vip-list', 'MAÇTV VIP', false);
        renderList(iptvChannels, 'iptv-list', 'DIŞ BAĞLANTI', true);
    </script>
</body>
</html>
