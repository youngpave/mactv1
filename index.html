<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --card: #121620; --blue: #2563eb; --gray: #94a3b8; }
        
        html, body { 
            background: var(--bg); 
            color: white; 
            font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            height: 100%; overflow: hidden; 
        }

        /* PLAYER ALANI - TEPEDE SABİT VE SINIRLANDIRILMIŞ */
        #player-container { 
            width: 100%; 
            background: #000; 
            position: fixed; 
            top: 0; left: 0;
            z-index: 1000; 
            border-bottom: 2px solid var(--blue);
            display: flex;
            justify-content: center;
        }

        /* Mobilde Player Yüksekliği */
        @media (max-width: 1023px) {
            #player-container { aspect-ratio: 16 / 9; }
        }

        /* Bilgisayarda Player'ın aşırı büyümesini engelle */
        @media (min-width: 1024px) {
            #player-container { height: 400px; }
        }

        .video-js { width: 100% !important; height: 100% !important; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #000; }

        /* KANAL LİSTESİ KONTEYNERI */
        .container { 
            height: 100vh; 
            overflow-y: auto; 
            padding: 15px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }

        /* Liste için Player kadar üst boşluk bırak */
        @media (max-width: 1023px) {
            .container { padding-top: calc(56.25vw + 10px); }
        }
        @media (min-width: 1024px) {
            .container { padding-top: 415px; max-width: 800px; margin: 0 auto; }
        }

        .ch-card { 
            background: var(--card); 
            display: flex; 
            align-items: center; 
            padding: 14px; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: 0.2s; 
        }
        .ch-card:active { transform: scale(0.96); background: #1a202e; }
        
        .icon { 
            width: 35px; height: 35px; 
            background: linear-gradient(135deg, var(--blue), #1e40af); 
            border-radius: 8px; 
            margin-right: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 12px; 
        }
        .info { flex: 1; }
        .title { display: block; font-size: 14px; font-weight: 600; }
        .tag { font-size: 8px; color: var(--gray); text-transform: uppercase; }
        
        .vjs-play-progress { background-color: #ff0000 !important; }
    </style>
</head>
<body>

        function playChannel(url) {
            const isVideo = url.includes('.m3u8') || url.includes('get.php');
            if (isVideo) {
                iframe.style.display = 'none';
                videoElement.style.display = 'block';
                videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videoPlayer.play();
            } else {
                videoPlayer.pause();
                videoElement.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;
            }
        }

        const listDiv = document.getElementById('channel-list');
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'ch-card';
            card.onclick = () => playChannel(ch.url);
            card.innerHTML = `
                <div class="icon">${ch.name.substring(0,2)}</div>

            listDiv.appendChild(card);
        });
