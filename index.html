<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MAÇTV | VIP Panel</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --card: #121620; --blue: #2563eb; --gray: #94a3b8; }
        html, body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }
        
        /* Oynatıcı Alanı */
        #player-container { 
            width: 100%; background: #000; position: fixed; top: env(safe-area-inset-top); 
            z-index: 1000; border-bottom: 2px solid var(--blue); display: flex; justify-content: center;
        }
        
        /* Video İçindeki Akıllı Buton (Dokununca Gelen) */
        #fs-toggle-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1001;
            background: rgba(37, 99, 235, 0.9); color: white; border: none;
            padding: 10px 18px; border-radius: 30px; font-size: 11px; font-weight: bold;
            cursor: pointer; opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }
        #player-container.active-ui #fs-toggle-btn { opacity: 1; pointer-events: auto; }

        @media (max-width: 1023px) { #player-container { aspect-ratio: 16 / 9; } }
        @media (min-width: 1024px) { #player-container { height: 400px; } }
        
        .video-js { width: 100% !important; height: 100% !important; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #000; }
        
        /* Ana İçerik Kapsayıcı */
        .container { 
            height: 100vh; overflow-y: auto; padding: 15px; box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }
        @media (max-width: 1023px) { .container { padding-top: calc(56.25vw + 10px); } }
        @media (min-width: 1024px) { .container { padding-top: 410px; max-width: 800px; margin: 0 auto; } }

        /* SABİT PANEL (Player ile Liste Arasındaki Kısım) */
        .fixed-controls {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(37, 99, 235, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .fixed-fs-btn {
            background: var(--blue);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .ch-card { 
            background: var(--card); display: flex; align-items: center; padding: 14px; 
            border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
        }
        .icon { 
            width: 38px; height: 38px; background: linear-gradient(135deg, var(--blue), #1e40af); 
            border-radius: 8px; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px;
        }
        .info { flex: 1; }
        .title { display: block; font-size: 14px; font-weight: 600; }
        .tag { font-size: 9px; color: var(--gray); text-transform: uppercase; }
    </style>
</head>
<body onclick="handleGlobalClick()">

    <div id="player-container">
        <button id="fs-toggle-btn" onclick="toggleFullScreen(event)">⛶ TAM EKRAN</button>
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline webkit-playsinline></video>
        <iframe id="external-frame" allowfullscreen></iframe>
    </div>

    <div class="container">
        <div class="fixed-controls">
            <button class="fixed-fs-btn" onclick="toggleFullScreen(event)">
                <span>⛶</span> EKRANI KAPLA (TAM EKRAN)
            </button>
        </div>

        <div id="channel-list"></div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const videoPlayer = videojs('my-video');
        const iframe = document.getElementById('external-frame');
        const videoElement = document.getElementById('my-video');
        const playerContainer = document.getElementById('player-container');
        let uiTimeout;

        function handleGlobalClick(customDuration = 3000) {
            playerContainer.classList.add('active-ui');
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => {
                playerContainer.classList.remove('active-ui');
            }, customDuration);
        }

        // İlk açılışta video içindeki buton 30sn kalsın
        window.onload = () => { handleGlobalClick(30000); };

        const channels = [
            { name: "UFC", url: "https://trendy47.dad/event/live-event_ufc-327-prochazka-vs-ulberg-live-stream" },
            { name: "BEIN SPORTS HABER", url: "https://www.canlitv.diy/player/iframe.php?url=https://www.youtube.com/embed/i7UpPgxfZZ8" },
            { name: "BEIN SPORTS 1 HD", url: "https://l1l1.link/stream?id=91" },
            { name: "BEIN SPORTS 2 HD", url: "https://zonalive.click/player/33/152" },
            { name: "BEIN SPORTS 3 HD", url: "https://antenasport.org/beinsport3tr.php" },
            { name: "BEIN SPORTS 4", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedebs4.m3u8" },
            { name: "BEIN SPORTS 5", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedebs5.m3u8" },
            { name: "BEIN SPORTS MAX 1", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedebsm1.m3u8" },
            { name: "BEIN SPORTS MAX 2", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedebsm2.m3u8" },
            { name: "S SPORT", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedess1.m3u8" },
            { name: "S SPORT 2", url: "https://andro.evrenosoglu53.lat/checklist/androstreamlivedess2.m3u8" },
            { name: "TV8.5", url: "https://rkhubpaomb.turknet.ercdn.net/fwjkgpasof/tv8bucuk/tv8bucuk.m3u8" },
            { name: "TRT SPOR", url: "https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8" },
            { name: "TABİİ SPOR 1", url: "https://74betorspintv.live/channel?id=ex1" },
            { name: "TABİİ SPOR 2", url: "https://mr8bv4kl1nq7sh9tw2xp5zj6g.medya.trt.com.tr/master_1440p.m3u8" },
            { name: "TABİİ SPOR 3", url: "https://mr4vl7nq2sh9tw5xp1zk3gj8b.medya.trt.com.tr/master_1440p.m3u8" },
            { name: "TABİİ SPOR 4", url: "https://sh7tq2nw5mr1vl9xp4zk3gj8k.medya.trt.com.tr/master_1440p.m3u8" },
            { name: "TABİİ SPOR 5", url: "https://z3mmimwz148csv0vaxtphqspf.medya.trt.com.tr/master_1080p.m3u8" },
            { name: "TABİİ SPOR 6", url: "https://nw5mr1vl9xp4zk2sh7tq3gj6b.medya.trt.com.tr/master_1440p.m3u8" }
        ];

        function playChannel(url) {
            const isVideo = url.toLowerCase().includes('.m3u8');
            if (isVideo) {
                iframe.style.display = 'none';
                videoElement.style.display = 'block';
                videoPlayer.src({ src: url, type: 'application/x-mpegURL' });
                videoPlayer.load();
                videoPlayer.play().catch(e => console.log(e));
            } else {
                videoPlayer.pause();
                videoElement.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = url;
            }
        }

        function toggleFullScreen(event) {
            event.stopPropagation(); 
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (playerContainer.requestFullscreen) playerContainer.requestFullscreen();
                else if (playerContainer.webkitRequestFullscreen) playerContainer.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        const listDiv = document.getElementById('channel-list');
        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'ch-card';
            card.onclick = () => playChannel(ch.url);
            card.innerHTML = `
                <div class="icon">${ch.name.substring(0,2)}</div>
                <div class="info">
                    <span class="title">${ch.name}</span>
                    <span class="tag">MAÇTV VIP</span>
                </div>
                <div style="color:var(--blue)">▶</div>
            `;
            listDiv.appendChild(card);
        });
    </script>
</body>
</html>
