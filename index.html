<!DOCTYPE html>
<html lang="tr">
<head>

    <title>MaçTV - Canlı Yayın</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --accent-blue: #3b82f6; --live-red: #ef4444; --icon-purple: #8b5cf6; }
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: sans-serif; }
        header { display: flex; align-items: center; gap: 12px; padding: 15px 20px; background: var(--bg-dark); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-box { background: #fff; color: #000; padding: 4px 8px; border-radius: 6px; font-weight: 900; }
        .site-title { color: var(--accent-blue); font-size: 20px; font-weight: bold; }
        .player-section { width: 100%; max-width: 900px; margin: 0 auto; background: #000; position: relative; }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        .refresh-btn { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; font-size: 12px; z-index: 10; cursor: pointer; color: white; border: 1px solid white; }
        .list-header { padding: 20px; font-size: 18px; font-weight: bold; }
        .channels-wrapper { padding: 0 15px 50px; display: flex; flex-direction: column; gap: 10px; }
        .channel-card { background: var(--card-bg); padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .ch-details { display: flex; align-items: center; gap: 10px; }
        .play-btn-icon { background: var(--icon-purple); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .live-pill { background: var(--live-red); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
